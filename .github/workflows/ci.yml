name: ci

on:
  push:
  pull_request:

jobs:
  vnext:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff mypy
      - name: Ruff
        run: ruff check biopharma_agent/vnext *.py
      - name: Mypy
        run: mypy biopharma_agent/vnext discord_bot.py evaluate_vnext.py operate_vnext.py readiness_vnext.py research_audit_vnext.py trade_vnext.py
      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test*.py'
